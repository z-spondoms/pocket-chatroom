<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate, max-age=0"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Pocket Chatroom</title>
    <meta
      name="description"
      content="Offline chatroom running directly on the ESP8266 captive portal."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <h1>Pocket Chatroom</h1>
        <p class="hero-copy">
          A local chatroom for everyone connected to this Wi-Fi access point.
        </p>
        <p id="history-note" class="muted history-note"></p>
        <div class="pill-row">
          <span class="pill">No internet</span>
          <span class="pill">No cloud</span>
          <span class="pill">No external connections</span>
        </div>
      </section>

      <input
        id="hidden"
        name="hidden"
        type="text"
        readonly
        tabindex="-1"
        aria-hidden="true"
      />

      <section class="chat-card">
        <div class="chat-toolbar">
          <div>
            <h2>Chatroom</h2>
            <p id="connection-status" class="muted">Connecting ...</p>
          </div>
        </div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <div class="composer-divider" aria-hidden="true"></div>

        <form id="chat-form" class="composer">
          <label class="input-group">
            <span>Username</span>
            <input
              id="username"
              name="user"
              type="text"
              maxlength="24"
              value="Anonymous"
              autocomplete="nickname"
            />
          </label>

          <label class="input-group">
            <span>Message</span>
            <textarea
              id="message"
              name="msg"
              maxlength="200"
              placeholder="Say something to the room ..."
              required
            ></textarea>
          </label>

          <div class="composer-footer">
            <p id="message-count" class="muted">0 / 200</p>
            <button id="send-button" type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>

    <template id="message-template">
      <article class="message">
        <div class="message-header">
          <strong class="message-user"></strong>
          <span class="message-time"></span>
        </div>
        <p class="message-body"></p>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
